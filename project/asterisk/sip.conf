; ============================================================
; sip.conf — Configuration SIP locale (pas de provider externe)
; ============================================================

[general]
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=no
tcpbindaddr=0.0.0.0
transport=udp
srvlookup=yes
disallow=all
allow=ulaw
allow=alaw
allow=gsm
nat=force_rport,comedia
qualify=yes
relaxdtmf=yes
dtmfmode=rfc2833

; ============================================================
; Trunk interne vers chan_dongle (pas de SIP trunk GSM)
; Les appels GSM passent directement par dongle.conf
; Ce peer est utilisé si vous avez un softphone local
; ============================================================
[local-softphone]
type=friend
context=alert-outbound
host=dynamic
secret=alertlocal123
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
