; ============================================================
; /etc/asterisk/manager.conf — AMI pour Node.js
; ============================================================
; Ajouter ces lignes à votre manager.conf existant

[general]
enabled = yes
port = 5038
bindaddr = 127.0.0.1
allowmultiplelogin = yes

[alertadmin]
secret = alertpass123
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.255
read = all
write = all
writetimeout = 5000
