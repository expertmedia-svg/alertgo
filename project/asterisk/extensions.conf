; ============================================================
; extensions.conf — Plateforme d'alerte communautaire
; ============================================================

[globals]
ALERT_TYPE=feu
BACKEND_HOST=127.0.0.1
BACKEND_PORT=3000

; ============================================================
; Contexte principal d'alerte sortante
; ============================================================
[alert-outbound]
; Déclenché par l'AMI Originate depuis Node.js
; Variable ALERT_TYPE passée à l'appel (feu|eau|communaute)
; Variable CONTACT_ID passée pour tracking

exten => s,1,Answer()
 same => n,Wait(1)
 same => n,AGI(agi://127.0.0.1/log_call_answered,${CONTACT_ID})
 same => n,Playback(/var/lib/asterisk/sounds/custom/bienvenue)
 same => n,Playback(/var/lib/asterisk/sounds/custom/${ALERT_TYPE})
 same => n,Playback(/var/lib/asterisk/sounds/custom/menu)
 same => n,Read(RESPONSE,beep,1,3,3,5)
 same => n,GotoIf($["${RESPONSE}" = "1"]?choix1)
 same => n,GotoIf($["${RESPONSE}" = "2"]?choix2)
 same => n,GotoIf($["${RESPONSE}" = "3"]?choix3)
 same => n,Goto(no_input)

exten => s,n(choix1),AGI(agi://127.0.0.1/record_response,${CONTACT_ID},1)
 same => n,Playback(/var/lib/asterisk/sounds/custom/bienvenue)
 same => n,Hangup()

exten => s,n(choix2),AGI(agi://127.0.0.1/record_response,${CONTACT_ID},2)
 same => n,Playback(/var/lib/asterisk/sounds/custom/bienvenue)
 same => n,Hangup()

exten => s,n(choix3),AGI(agi://127.0.0.1/record_response,${CONTACT_ID},3)
 same => n,Playback(/var/lib/asterisk/sounds/custom/bienvenue)
 same => n,Hangup()

exten => s,n(no_input),AGI(agi://127.0.0.1/record_response,${CONTACT_ID},0)
 same => n,Hangup()

; ============================================================
; Gestion des événements d'appel (occupé, non répondu)
; ============================================================
[alert-failed]
exten => s,1,AGI(agi://127.0.0.1/log_call_failed,${CONTACT_ID},FAILED)
 same => n,Hangup()

[alert-busy]
exten => s,1,AGI(agi://127.0.0.1/log_call_failed,${CONTACT_ID},BUSY)
 same => n,Hangup()

[alert-noanswer]
exten => s,1,AGI(agi://127.0.0.1/log_call_failed,${CONTACT_ID},NOANSWER)
 same => n,Hangup()
