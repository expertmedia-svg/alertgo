; ============================================================
; dongle.conf — Configuration chan_dongle (modems GSM USB)
; ============================================================
; Prérequis : apt install asterisk-chan-dongle
; Vérifier le port : ls /dev/ttyUSB* ou ls /dev/ttyACM*
; ============================================================

[general]
interval=15              ; Intervalle de contrôle (secondes)

; ============================================================
; MODEM 1 — Premier dongle USB
; ============================================================
[dongle0]
audio=/dev/ttyUSB1       ; Port audio (adapter selon votre système)
data=/dev/ttyUSB2        ; Port data/commandes AT
group=0
rxgain=3                 ; Gain réception (0-10)
txgain=3                 ; Gain émission (0-10)
autodeletesms=yes
resetdongle=yes
u2diag=-1
usecallingpres=yes
callingpres=allowed_passed_screen
disallow=all
allow=gsm
allow=ulaw
allow=alaw
context=alert-outbound   ; Contexte pour appels entrants
exten=+22600000000       ; Remplacer par votre numéro SIM
imei=000000000000000     ; Rempli automatiquement
imsi=000000000000000     ; Rempli automatiquement

; ============================================================
; MODEM 2 — Second dongle USB (multi-modem)
; ============================================================
[dongle1]
audio=/dev/ttyUSB3
data=/dev/ttyUSB4
group=1
rxgain=3
txgain=3
autodeletesms=yes
resetdongle=yes
u2diag=-1
usecallingpres=yes
callingpres=allowed_passed_screen
disallow=all
allow=gsm
allow=ulaw
allow=alaw
context=alert-outbound
exten=+22600000001
imei=000000000000001
imsi=000000000000001

; ============================================================
; MODEM 3 — Troisième dongle (optionnel)
; ============================================================
;[dongle2]
;audio=/dev/ttyUSB5
;data=/dev/ttyUSB6
;group=2
;rxgain=3
;txgain=3
;autodeletesms=yes
;resetdongle=yes
;context=alert-outbound
;exten=+22600000002
